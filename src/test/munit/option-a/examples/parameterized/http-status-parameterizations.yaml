# =============================================================================
# HTTP status -> Mule error type map: the data.
#
# One entry per IANA-registered HTTP status code (62) plus 418 (not registered,
# but universally implemented) = 63 rows.
#
# Each row drives ONE run of `statusCodeProducesExpectedErrorType` in
# impl-all-http-status-parameterized-test-suite.xml. The parameterization name
# is what MUnit prints in the report, so a red row names its own status code.
#
# Fields:
#   statusCode        the code the mock listener is asked to return
#   expectedErrorType "<namespace>:<identifier>", or "" when no error is raised
#
# Seeding rule (see ../../../../../../CONTEXT.md, "Seed-and-Correct"):
#   - named type   where MuleSoft documents one for that code
#   - MULE:UNKNOWN for any 4xx/5xx with no named type (proven for 409/410/422/511)
#   - ""           for 1xx/2xx/3xx, which are not expected to raise at all
#
# Rows marked PROVEN are already green in the longhand suite
# (../impl-all-http-status-test-suite.xml). Every other row is a hypothesis
# that the first run either confirms or corrects.
# =============================================================================

# --- 1xx informational --------------------------------------------------------
# Interim responses are normally consumed by the transport layer and may never
# reach the flow. If a row hangs or cannot be produced, delete it here and
# footnote it in README.adoc - "not producible through a real listener" is a
# finding, not a failure.
"100-continue":
  statusCode: "100"
  expectedErrorType: ""
"101-switching-protocols":
  statusCode: "101"
  expectedErrorType: ""
"102-processing":
  statusCode: "102"
  expectedErrorType: ""
"103-early-hints":
  statusCode: "103"
  expectedErrorType: ""

# --- 2xx success --------------------------------------------------------------
# The default response validator throws only at 400 and above, so all of these
# are expected to return normally. 204/205/304 forbid a response body; the mock
# listener echoes the request payload, so those are the rows most likely to
# behave oddly.
"200-ok":
  statusCode: "200"
  expectedErrorType: ""          # PROVEN
"201-created":
  statusCode: "201"
  expectedErrorType: ""          # PROVEN
"202-accepted":
  statusCode: "202"
  expectedErrorType: ""
"203-non-authoritative-information":
  statusCode: "203"
  expectedErrorType: ""
"204-no-content":
  statusCode: "204"
  expectedErrorType: ""          # PROVEN
"205-reset-content":
  statusCode: "205"
  expectedErrorType: ""
"206-partial-content":
  statusCode: "206"
  expectedErrorType: ""
"207-multi-status":
  statusCode: "207"
  expectedErrorType: ""
"208-already-reported":
  statusCode: "208"
  expectedErrorType: ""
"226-im-used":
  statusCode: "226"
  expectedErrorType: ""

# --- 3xx redirection ----------------------------------------------------------
# followRedirects defaults to true, but the mock listener sends no Location
# header, so there is nothing to follow: these are expected to surface as
# ordinary non-error responses. See README.adoc for the followRedirects=false
# contrast test.
"300-multiple-choices":
  statusCode: "300"
  expectedErrorType: ""
"301-moved-permanently":
  statusCode: "301"
  expectedErrorType: ""
"302-found":
  statusCode: "302"
  expectedErrorType: ""
"303-see-other":
  statusCode: "303"
  expectedErrorType: ""
"304-not-modified":
  statusCode: "304"
  expectedErrorType: ""
"305-use-proxy":
  statusCode: "305"
  expectedErrorType: ""
"306-unused":
  statusCode: "306"
  expectedErrorType: ""
"307-temporary-redirect":
  statusCode: "307"
  expectedErrorType: ""
"308-permanent-redirect":
  statusCode: "308"
  expectedErrorType: ""

